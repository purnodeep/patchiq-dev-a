openapi: 3.1.0

info:
  title: PatchIQ Patch Manager API
  version: 0.1.0
  license:
    name: Proprietary
    url: https://patchiq.io/license

servers:
  - url: http://localhost:8080

tags:
  - name: System
    description: Health and readiness checks
  - name: Endpoints
    description: Managed endpoint operations
  - name: Patches
    description: Patch catalog operations
  - name: Policies
    description: Patch policy operations
  - name: Deployments
    description: Deployment operations
  - name: CVEs
    description: CVE vulnerability operations
  - name: Dashboard
    description: Dashboard summary
  - name: Audit
    description: Audit event log
  - name: Auth
    description: Authentication (SSO, login, logout)
  - name: IAM
    description: Identity & Access Management settings
  - name: Workflows
    description: Workflow management and execution
  - name: Compliance
    description: Compliance framework management
  - name: Notifications
    description: Notification channels, preferences, and history
  - name: Roles
    description: Role-based access control
  - name: UserRoles
    description: User role assignments
  - name: License
    description: License status
  - name: HubSync
    description: Hub synchronization
  - name: DeploymentSchedules
    description: Deployment schedule management
  - name: Alerts
    description: Alert management and alert rule configuration
  - name: Organizations
    description: Organizations and MSP-tenant provisioning

components:
  parameters:
    TenantId:
      name: X-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: The tenant identifier — optional when using cookie-based authentication (server extracts tenant from session)

    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque pagination cursor from a previous response

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: Maximum number of items to return

    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique resource identifier (UUID)

  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: TENANT_NOT_FOUND
        message:
          type: string
        details:
          type: array
          items:
            type: object
          default: []

    Endpoint:
      type: object
      required:
        - id
        - tenant_id
        - hostname
        - os_family
        - os_version
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        hostname:
          type: string
        os_family:
          type: string
        os_version:
          type: string
        agent_version:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - pending
            - active
            - inactive
            - decommissioned
        last_seen:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Patch:
      type: object
      required:
        - id
        - tenant_id
        - name
        - version
        - severity
        - os_family
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
            - none
        os_family:
          type: string
        cve_ids:
          type: array
          items:
            type: string
          default: []
        status:
          type: string
          enum:
            - available
            - superseded
            - recalled
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TargetSelector:
      type: object
      description: |
        Tag-based target selector AST. Recursive JSONB expression composed of
        boolean operators (and/or/not) and tag predicates (eq/in/exists).
        A missing or empty selector means "no endpoints" (fail-safe default).
      additionalProperties: true

    Policy:
      type: object
      required:
        - id
        - tenant_id
        - name
        - enabled
        - selection_mode
        - created_at
        - updated_at
        - mode
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type:
            - string
            - "null"
        enabled:
          type: boolean
        selection_mode:
          type: string
          enum:
            - all_available
            - by_severity
            - by_cve_list
            - by_regex
        target_selector:
          oneOf:
            - $ref: "#/components/schemas/TargetSelector"
            - type: "null"
        min_severity:
          type:
            - string
            - "null"
          enum:
            - critical
            - high
            - medium
            - low
            - null
        cve_ids:
          type: array
          items:
            type: string
          default: []
        package_regex:
          type:
            - string
            - "null"
        exclude_packages:
          type: array
          items:
            type: string
          default: []
        schedule_type:
          type: string
          enum:
            - manual
            - recurring
          default: manual
        schedule_cron:
          type:
            - string
            - "null"
        mw_start:
          type:
            - string
            - "null"
          description: "Maintenance window start time (HH:MM)"
        mw_end:
          type:
            - string
            - "null"
          description: "Maintenance window end time (HH:MM)"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        mode:
          type: string
          enum:
            - automatic
            - manual
            - advisory
        target_endpoints_count:
          type: integer
        last_evaluated_at:
          type:
            - string
            - "null"
          format: date-time
        last_eval_pass:
          type:
            - boolean
            - "null"
        last_eval_endpoint_count:
          type:
            - integer
            - "null"
        last_eval_compliant_count:
          type:
            - integer
            - "null"
        policy_type:
          type: string
          enum:
            - patch
            - deploy
            - compliance
          default: patch
        timezone:
          type: string
          default: UTC
        mw_enabled:
          type: boolean
          default: false

    CreatePolicyRequest:
      type: object
      required:
        - name
        - selection_mode
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        selection_mode:
          type: string
          enum:
            - all_available
            - by_severity
            - by_cve_list
            - by_regex
        target_selector:
          $ref: "#/components/schemas/TargetSelector"
        min_severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
        cve_ids:
          type: array
          items:
            type: string
        package_regex:
          type: string
        exclude_packages:
          type: array
          items:
            type: string
        schedule_type:
          type: string
          enum:
            - manual
            - recurring
          default: manual
        schedule_cron:
          type: string
        mw_start:
          type: string
        mode:
          type: string
          enum:
            - automatic
            - manual
            - advisory
        mw_end:
          type: string
        policy_type:
          type: string
          enum:
            - patch
            - deploy
            - compliance
          default: patch
        timezone:
          type: string
          default: UTC
        mw_enabled:
          type: boolean
          default: false

    UpdatePolicyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        enabled:
          type: boolean
        selection_mode:
          type: string
          enum:
            - all_available
            - by_severity
            - by_cve_list
            - by_regex
        target_selector:
          $ref: "#/components/schemas/TargetSelector"
        min_severity:
          type: string
          enum:
            - critical
            - high
            - medium
            - low
        cve_ids:
          type: array
          items:
            type: string
        package_regex:
          type: string
        exclude_packages:
          type: array
          items:
            type: string
        schedule_type:
          type: string
          enum:
            - manual
            - recurring
        schedule_cron:
          type: string
        mw_start:
          type: string
        mode:
          type: string
          enum:
            - automatic
            - manual
            - advisory
        mw_end:
          type: string
        policy_type:
          type: string
          enum:
            - patch
            - deploy
            - compliance
          default: patch
        timezone:
          type: string
          default: UTC
        mw_enabled:
          type: boolean
          default: false

    PolicyEvaluation:
      type: object
      required:
        - id
        - evaluated_at
        - matched_patches
        - in_scope_endpoints
        - compliant_count
        - non_compliant_count
        - duration_ms
        - pass
      properties:
        id:
          type: string
          format: uuid
        evaluated_at:
          type: string
          format: date-time
        matched_patches:
          type: integer
        in_scope_endpoints:
          type: integer
        compliant_count:
          type: integer
        non_compliant_count:
          type: integer
        duration_ms:
          type: integer
        pass:
          type: boolean

    PolicyDetail:
      allOf:
        - $ref: "#/components/schemas/Policy"
        - type: object
          properties:
            matched_endpoints:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  hostname:
                    type: string
                  os_family:
                    type: string
                  status:
                    type: string
            recent_evaluations:
              type: array
              items:
                $ref: "#/components/schemas/PolicyEvaluation"
            recent_deployments:
              type: array
              items:
                $ref: "#/components/schemas/Deployment"
            deployment_count:
              type: integer

    BulkPolicyRequest:
      type: object
      required:
        - ids
        - action
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        action:
          type: string
          enum:
            - enable
            - disable
            - delete

    EvaluationResult:
      type: object
      required:
        - total_endpoints
        - total_patches
        - results
      properties:
        total_endpoints:
          type: integer
        total_patches:
          type: integer
        results:
          type: array
          items:
            type: object
            required:
              - endpoint_id
              - hostname
              - patch_count
            properties:
              endpoint_id:
                type: string
                format: uuid
              hostname:
                type: string
              os_family:
                type: string
              patch_count:
                type: integer

    Deployment:
      type: object
      required:
        - id
        - tenant_id
        - policy_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        policy_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - created
            - scheduled
            - running
            - completed
            - failed
            - cancelled
            - rolling_back
            - rolled_back
            - rollback_failed
        created_by:
          type:
            - string
            - "null"
          format: uuid
        started_at:
          type:
            - string
            - "null"
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        target_count:
          type: integer
          default: 0
        completed_count:
          type: integer
          default: 0
        success_count:
          type: integer
          default: 0
        failed_count:
          type: integer
          default: 0
        name:
          type: string
          description: Human-readable name for the deployment (set for ad-hoc deployments)
        policy_name:
          type: string
          description: Name of the associated policy, denormalized for display
        wave_config:
          type: array
          items:
            $ref: "#/components/schemas/WaveConfig"
          description: Wave configuration for staged rollout
        max_concurrent:
          type:
            - integer
            - "null"
          description: Maximum number of concurrent target installations
        scheduled_at:
          type:
            - string
            - "null"
          format: date-time
          description: Scheduled execution time (null means immediate)

    DeploymentTarget:
      type: object
      required:
        - id
        - deployment_id
        - endpoint_id
        - hostname
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        deployment_id:
          type: string
          format: uuid
        endpoint_id:
          type: string
          format: uuid
        hostname:
          type: string
        status:
          type: string
          enum:
            - pending
            - sent
            - executing
            - succeeded
            - failed
        exit_code:
          type:
            - integer
            - "null"
        output:
          type:
            - string
            - "null"
          description: stdout/stderr from the agent
        error:
          type:
            - string
            - "null"
        wave_id:
          type:
            - string
            - "null"
          format: uuid
        started_at:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type: string
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time

    DeploymentPatchSummary:
      type: object
      required:
        - patch_id
        - patch_title
        - total_targets
        - success_count
        - failed_count
      properties:
        patch_id:
          type: string
          format: uuid
        patch_title:
          type: string
        patch_version:
          type: string
        patch_severity:
          type: string
        total_targets:
          type: integer
        success_count:
          type: integer
        failed_count:
          type: integer

    CreateDeploymentRequest:
      type: object
      properties:
        policy_id:
          type: string
          format: uuid
        source_type:
          type: string
          enum:
            - policy
            - catalog
            - adhoc
          description: Deployment source type
        endpoint_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Explicit target endpoint IDs (required for catalog/adhoc)
        patch_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Explicit patch IDs to deploy (for catalog/adhoc)
        name:
          type: string
          description: Human-readable deployment name
        description:
          type: string
          description: Deployment description
        target_expression:
          description: Tag-based target expression for endpoint matching
        wave_config:
          type: array
          items:
            $ref: "#/components/schemas/WaveConfig"
          description: Wave configuration for staged rollout
        max_concurrent:
          type: integer
          description: Maximum number of concurrent target installations
        scheduled_at:
          type: string
          format: date-time
          description: Scheduled execution time (omit for immediate)
        rollback_config:
          type: object
          additionalProperties: true
          description: Rollback configuration
        reboot_config:
          type: object
          additionalProperties: true
          description: Reboot configuration
        workflow_template_id:
          type: string
          format: uuid
          description: Workflow template to execute as part of deployment

    AuditEvent:
      type: object
      required:
        - id
        - tenant_id
        - type
        - actor_id
        - actor_type
        - resource
        - resource_id
        - action
        - timestamp
      properties:
        id:
          type: string
          description: ULID identifier
        tenant_id:
          type: string
          format: uuid
        type:
          type: string
        actor_id:
          type: string
        actor_type:
          type: string
          enum:
            - user
            - system
            - ai_assistant
        resource:
          type: string
        resource_id:
          type: string
          format: uuid
        action:
          type: string
        payload:
          type: object
          default: {}
        metadata:
          type: object
          default: {}
        timestamp:
          type: string
          format: date-time

    Alert:
      type: object
      required: [id, tenant_id, event_id, severity, category, title, description, resource, resource_id, status, payload, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
          format: uuid
        rule_id:
          type: string
          format: uuid
        event_id:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        category:
          type: string
          enum: [deployments, agents, cves, compliance, system]
        title:
          type: string
        description:
          type: string
        resource:
          type: string
        resource_id:
          type: string
        status:
          type: string
          enum: [unread, read, acknowledged, dismissed]
        payload:
          type: object
          default: {}
        created_at:
          type: string
          format: date-time
        read_at:
          type: [string, "null"]
          format: date-time
        acknowledged_at:
          type: [string, "null"]
          format: date-time
        dismissed_at:
          type: [string, "null"]
          format: date-time

    AlertRule:
      type: object
      required: [id, tenant_id, event_type, severity, category, title_template, description_template, enabled, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        event_type:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        category:
          type: string
          enum: [deployments, agents, cves, compliance, system]
        title_template:
          type: string
        description_template:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AlertCountResponse:
      type: object
      required: [critical_unread, warning_unread, info_unread, total_unread]
      properties:
        critical_unread:
          type: integer
        warning_unread:
          type: integer
        info_unread:
          type: integer
        total_unread:
          type: integer

    CreateAlertRuleRequest:
      type: object
      required: [event_type, severity, category, title_template, description_template, enabled]
      properties:
        event_type:
          type: string
        severity:
          type: string
          enum: [critical, warning, info]
        category:
          type: string
          enum: [deployments, agents, cves, compliance, system]
        title_template:
          type: string
        description_template:
          type: string
        enabled:
          type: boolean

    UpdateAlertStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [unread, read, acknowledged, dismissed]

    BulkUpdateAlertStatusRequest:
      type: object
      required: [ids, status]
      properties:
        ids:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [unread, read, acknowledged, dismissed]

    CVE:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        cve_id:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, none]
        description:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cvss_v3_score:
          type: number
          nullable: true
        cvss_v3_vector:
          type: string
          nullable: true
        cisa_kev_due_date:
          type: string
          format: date
          nullable: true
        exploit_available:
          type: boolean
        nvd_last_modified:
          type: string
          format: date-time
        affected_endpoint_count:
          type: integer
        patch_available:
          type: boolean
        attack_vector:
          type: string
          nullable: true
          enum: [Network, Adjacent, Local, Physical]

    CVEDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        cve_id:
          type: string
        severity:
          type: string
        description:
          type: string
          nullable: true
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cvss_v3_score:
          type: number
          nullable: true
        cvss_v3_vector:
          type: string
          nullable: true
        cisa_kev_due_date:
          type: string
          format: date
          nullable: true
        exploit_available:
          type: boolean
        nvd_last_modified:
          type: string
          format: date-time
        attack_vector:
          type: string
          nullable: true
        cwe_id:
          type: string
          nullable: true
        source:
          type: string
        external_references:
          type: array
          items:
            $ref: '#/components/schemas/ExternalReference'
        affected_endpoints:
          type: object
          properties:
            count:
              type: integer
            items:
              type: array
              items:
                $ref: '#/components/schemas/AffectedEndpoint'
            has_more:
              type: boolean
        patches:
          type: array
          items:
            $ref: '#/components/schemas/CVEPatchDetail'
        related_cves:
          type: array
          items:
            $ref: '#/components/schemas/RelatedCVE'

    RelatedCVE:
      type: object
      properties:
        id:
          type: string
          format: uuid
        cve_id:
          type: string
        severity:
          type: string
        cvss_v3_score:
          type: number
          nullable: true

    ExternalReference:
      type: object
      properties:
        url:
          type: string
        source:
          type: string

    AffectedEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hostname:
          type: string
        os_family:
          type: string
        os_version:
          type: string
        ip_address:
          type: string
          nullable: true
        status:
          type: string
        agent_version:
          type: string
          nullable: true
        last_seen:
          type: string
          format: date-time
          nullable: true
        group_names:
          type: string
          nullable: true

    CVEPatchDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
        severity:
          type: string
        os_family:
          type: string
        released_at:
          type: string
          format: date-time
        endpoints_covered:
          type: integer
        endpoints_patched:
          type: integer

    CVESummary:
      type: object
      properties:
        total:
          type: integer
        by_severity:
          type: object
          additionalProperties:
            type: integer
        kev_count:
          type: integer

    CurrentUser:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
        tenant_id:
          type: string

    IAMSettings:
      type: object
      required:
        - user_sync_enabled
        - user_sync_interval_minutes
      properties:
        zitadel_org_id:
          type: string
        user_sync_enabled:
          type: boolean
        user_sync_interval_minutes:
          type: integer

    RoleMappingEntry:
      type: object
      required:
        - external_role
        - patchiq_role_id
      properties:
        external_role:
          type: string
        patchiq_role_id:
          type: string
