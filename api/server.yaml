          format: date-time
        expires_at:
          type: string
          format: date-time
        days_remaining:
          type: integer
        grace_period_days:
          type: integer
        in_grace_period:
          type: boolean
        endpoint_usage:
          $ref: "#/components/schemas/EndpointUsage"
        features:
          type: object
          additionalProperties:
            type: boolean

    # --- Hub Sync schemas ---

    HubSyncStatus:
      type: object
      required:
        - id
        - hub_url
        - status
        - sync_interval
        - entries_received
        - last_entry_count
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        hub_url:
          type: string
        status:
          type: string
        last_sync_at:
          type:
            - string
            - "null"
          format: date-time
        next_sync_at:
          type:
            - string
            - "null"
          format: date-time
        sync_interval:
          type: integer
        entries_received:
          type: integer
        last_entry_count:
          type: integer
        last_error:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SyncConfigRequest:
      type: object
      required:
        - hub_url
        - api_key
      properties:
        hub_url:
          type: string
        api_key:
          type: string
        sync_interval:
          type: integer

    # --- Deployment Wave & Schedule schemas ---

    DeploymentWave:
      type: object
      required:
        - id
        - deployment_id
        - wave_number
        - status
        - percentage
        - target_count
        - success_count
        - failed_count
        - delay_after_minutes
      properties:
        id:
          type: string
          format: uuid
        deployment_id:
          type: string
          format: uuid
        wave_number:
          type: integer
        status:
          type: string
        percentage:
          type: integer
        target_count:
          type: integer
        success_count:
          type: integer
        failed_count:
          type: integer
        delay_after_minutes:
          type: integer
        started_at:
          type:
            - string
            - "null"
          format: date-time
        completed_at:
          type:
            - string
            - "null"
          format: date-time
        eligible_at:
          type:
            - string
            - "null"
          format: date-time

    WaveConfig:
      type: object
      required:
        - percentage
        - success_threshold
        - error_rate_max
        - delay_minutes
      properties:
        percentage:
          type: integer
          minimum: 0
          maximum: 100
        success_threshold:
          type: number
        error_rate_max:
          type: number
        delay_minutes:
          type: integer

    DeploymentSchedule:
      type: object
      required:
        - id
        - policy_id
        - cron_expression
        - enabled
        - next_run_at
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        policy_id:
          type: string
          format: uuid
        cron_expression:
          type: string
        wave_config:
          type: array
          items:
            $ref: "#/components/schemas/WaveConfig"
        max_concurrent:
          type:
            - integer
            - "null"
        enabled:
          type: boolean
        last_run_at:
          type:
            - string
            - "null"
          format: date-time
        next_run_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateScheduleRequest:
      type: object
      required:
        - policy_id
        - cron_expression
      properties:
        policy_id:
          type: string
          format: uuid
        cron_expression:
          type: string
        wave_config:
          type: array
          items:
            $ref: "#/components/schemas/WaveConfig"
        max_concurrent:
          type: integer
        enabled:
          type: boolean
          default: true

    UpdateScheduleRequest:
      type: object
      properties:
        cron_expression:
          type: string
        wave_config:
          type: array
          items:
            $ref: "#/components/schemas/WaveConfig"
        max_concurrent:
          type: integer
        enabled:
          type: boolean

    Organization:
      type: object
      required:
        - id
        - name
        - slug
        - type
        - parent_org_id
        - zitadel_org_id
        - license_id
        - platform_tenant_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        type:
          type: string
          enum:
            - direct
            - msp
            - reseller
        parent_org_id:
          type:
            - string
            - "null"
          format: uuid
        zitadel_org_id:
          type:
            - string
            - "null"
        license_id:
          type:
            - string
            - "null"
          format: uuid
        platform_tenant_id:
          description: |
            Hidden "platform tenant" hosting org-scoped role definitions for
            MSP/reseller orgs. Always null for direct-type orgs. Set during
            CreateOrganization for type=msp|reseller.
          type:
            - string
            - "null"
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AssignOrgUserRoleRequest:
      type: object
      required:
        - role_id
      properties:
        role_id:
          type: string
          format: uuid

    OrganizationCreateRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - direct
            - msp
            - reseller
          default: direct
        parent_org_id:
          type: string
          format: uuid
        zitadel_org_id:
          type: string

    OrgTenantSummary:
      type: object
      required:
        - id
        - name
        - slug
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time

    ProvisionTenantRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        license_id:
          type: string

    OrgDashboardTenantRow:
      type: object
      required:
        - tenant_id
        - tenant_name
        - endpoint_count
      properties:
        tenant_id:
          type: string
          format: uuid
        tenant_name:
          type: string
        endpoint_count:
          type: integer
          format: int64

    OrgDashboardResponse:
      type: object
      required:
        - organization_id
        - total_tenants
        - total_endpoints
        - tenants
      properties:
        organization_id:
          type: string
          format: uuid
        total_tenants:
          type: integer
        total_endpoints:
          type: integer
          format: int64
        tenants:
          type: array
          items:
            $ref: "#/components/schemas/OrgDashboardTenantRow"

paths:
  /health:
    get:
      tags:
        - System
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: healthy

  /ready:
    get:
      tags:
        - System
      summary: Readiness check
      operationId: getReady
      responses:
        "200":
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                type: object
                required:
                  - ready
                properties:
                  ready:
                    type: boolean
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/endpoints:
    get:
      tags:
        - Endpoints
      summary: List endpoints
      operationId: listEndpoints
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated list of endpoints
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - next_cursor
                  - total_count
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Endpoint"
                  next_cursor:
                    type:
                      - string
                      - "null"
                  total_count:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/endpoints/{id}:
    get:
      tags:
        - Endpoints
      summary: Get endpoint by ID
      operationId: getEndpoint
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Endpoint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
        "404":
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - Endpoints
      summary: Update endpoint
      operationId: updateEndpoint
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      responses:
        "200":
          description: Endpoint updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Endpoint"
        "404":
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Endpoints
      summary: Delete endpoint
      operationId: deleteEndpoint
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Endpoint deleted
        "404":
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/endpoints/{id}/scan:
    post:
      tags:
        - Endpoints
      summary: Trigger inventory scan on endpoint
      operationId: triggerScan
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "202":
          description: Scan triggered
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        "404":
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/patches:
    get:
      tags:
        - Patches
      summary: List patches
      operationId: listPatches
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: os_family
          in: query
          schema:
            type: string
          description: Filter patches by OS family (e.g. debian, rhel)
      responses:
        "200":
          description: Paginated list of patches
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - next_cursor
                  - total_count
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Patch"
                  next_cursor:
                    type:
                      - string
                      - "null"
                  total_count:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/patches/{id}:
    get:
      tags:
        - Patches
      summary: Get patch by ID
      operationId: getPatch
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Patch details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patch"
        "404":
          description: Patch not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/cves:
    get:
      tags:
        - CVEs
      summary: List CVEs
      operationId: listCVEs
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: severity
          in: query
          schema:
            type: string
        - name: cisa_kev
          in: query
          schema:
            type: string
        - name: exploit_available
          in: query
          schema:
            type: string
        - name: attack_vector
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of CVEs
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - next_cursor
                  - total_count
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CVE"
                  next_cursor:
                    type:
                      - string
                      - "null"
                  total_count:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/cves/summary:
    get:
      summary: Get CVE summary counts
      operationId: getCVESummary
      tags:
        - CVEs
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: CVE summary counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CVESummary'

  /api/v1/cves/{id}:
    get:
      tags:
        - CVEs
      summary: Get CVE by ID
      operationId: getCVE
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: CVE details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CVEDetail"
        "404":
          description: CVE not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/policies:
    get:
      tags:
        - Policies
      summary: List policies
      operationId: listPolicies
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: mode
          in: query
          schema:
            type: string
            enum:
              - automatic
              - manual
              - advisory
        - name: search
          in: query
          schema:
            type: string
        - name: enabled
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of policies
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - next_cursor
                  - total_count
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Policy"
                  next_cursor:
                    type:
                      - string
                      - "null"
                  total_count:
                    type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Policies
      summary: Create policy
      operationId: createPolicy
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/policies/bulk:
    post:
      tags:
        - Policies
      summary: Bulk policy action
      operationId: bulkPolicyAction
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPolicyRequest"
      responses:
        "200":
          description: Bulk action completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  affected:
                    type: integer

  /api/v1/policies/{id}:
    get:
      tags:
        - Policies
      summary: Get policy by ID
      operationId: getPolicy
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Policy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyDetail"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - Policies
      summary: Update policy
      operationId: updatePolicy
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyRequest"
      responses:
        "200":
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Policies
      summary: Delete policy
      operationId: deletePolicy
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: Policy deleted
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/policies/{id}/evaluate:
    post:
      tags:
        - Policies
      summary: Evaluate policy (dry-run)
      operationId: evaluatePolicy
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Evaluation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationResult"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/deployments:
    get:
      tags:
        - Deployments
      summary: List deployments
      operationId: listDeployments
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter by deployment status
        - name: created_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Filter deployments created after this RFC3339 timestamp
        - name: created_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Filter deployments created before this RFC3339 timestamp
      responses:
        "200":
          description: Paginated list of deployments
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - next_cursor
                  - total_count
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Deployment"
                  next_cursor:
                    type:
                      - string
                      - "null"
                  total_count:
                    type: integer
                  status_counts:
                    type: object
                    additionalProperties:
                      type: integer
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Deployments
      summary: Create deployment
      operationId: createDeployment
      parameters:
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeploymentRequest"
      responses:
        "201":
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/deployments/{id}:
    get:
      tags:
        - Deployments
      summary: Get deployment by ID
      operationId: getDeployment
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deployment details with per-endpoint targets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Deployment"
                  - type: object
                    properties:
                      targets:
                        type: array
                        items:
                          $ref: "#/components/schemas/DeploymentTarget"
                        default: []
        "404":
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/deployments/{id}/cancel:
    post:
      tags:
        - Deployments
      summary: Cancel a deployment
      operationId: cancelDeployment
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deployment cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "404":
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Deployment cannot be cancelled (already completed or failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/deployments/{id}/retry:
    post:
      tags:
        - Deployments
      summary: Retry a failed deployment
      operationId: retryDeployment
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deployment retried
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "404":
          description: Deployment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Deployment cannot be retried in its current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/deployments/{id}/rollback:
    post:
      tags:
        - Deployments
      summary: Rollback a deployment
      operationId: rollbackDeployment
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: Deployment rollback initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "404":
