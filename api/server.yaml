  /api/v1/organizations/{id}/users/{user_id}/roles:
    post:
      tags:
        - Organizations
      summary: Assign an org-scoped role to a user
      description: |
        Grants the named role to the user inside this organization. The role
        must be an org-scoped preset (MSP Admin / Technician / Auditor) hosted
        in the org's platform tenant. Idempotent on the (org, user, role) tuple.
      operationId: assignOrganizationUserRole
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignOrgUserRoleRequest"
      responses:
        "204":
          description: Role assigned (or already present)
        "400":
          description: Invalid request body or role_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller lacks organizations:manage permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/organizations/{id}/users/{user_id}/roles/{role_id}:
    delete:
      tags:
        - Organizations
      summary: Revoke an org-scoped role from a user
      operationId: revokeOrganizationUserRole
      parameters:
        - $ref: "#/components/parameters/ResourceId"
        - name: user_id
          in: path
          required: true
          schema:
            type: string
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Role revoked
        "400":
          description: Invalid role_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller lacks organizations:manage permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Grant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
