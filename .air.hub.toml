root = "."
tmp_dir = "tmp/hub"

[build]
  bin = "tmp/hub/hub"
  cmd = "go build -o tmp/hub/hub ./cmd/hub"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "web", "web-hub", "web-agent", "packages", "node_modules", "deploy", "test", "docs"]
  exclude_regex = ["_test\\.go$"]
  include_dir = ["cmd/hub", "internal/hub", "internal/shared"]
  include_ext = ["go", "toml", "yaml"]
  kill_delay = 500

[log]
  time = false

[color]
  main = "blue"
  build = "yellow"
  runner = "cyan"
