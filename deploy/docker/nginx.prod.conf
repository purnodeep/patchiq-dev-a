# PatchIQ production nginx — serves all 3 frontends + proxies API to backends.
# Ports are injected via envsubst at container startup.
# Uses Docker DNS resolver (127.0.0.11) so upstream resolution is dynamic
# and nginx doesn't fail on startup if backends aren't ready yet.

resolver 127.0.0.11 valid=10s;

# Patch Manager UI
server {
    listen ${WEB_PORT};
    server_name _;
    root /srv/web;

    location /api/ {
        set $server_upstream http://server:8080;
        proxy_pass $server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID 00000000-0000-0000-0000-000000000001;
        proxy_set_header X-User-ID prod-user;
    }

    location /health {
        set $server_upstream http://server:8080;
        proxy_pass $server_upstream;
        proxy_set_header Host $host;
    }

    location /repo/ {
        set $server_upstream http://server:8080;
        proxy_pass $server_upstream;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Hub Manager UI
server {
    listen ${WEB_HUB_PORT};
    server_name _;
    root /srv/web-hub;

    location /api/ {
        set $hub_upstream http://hub:8082;
        proxy_pass $hub_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID 00000000-0000-0000-0000-000000000001;
        proxy_set_header X-User-ID prod-user;
    }

    location /health {
        set $hub_upstream http://hub:8082;
        proxy_pass $hub_upstream;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Agent UI (static only — agent runs natively on endpoints, not in Docker)
server {
    listen ${WEB_AGENT_PORT};
    server_name _;
    root /srv/web-agent;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
