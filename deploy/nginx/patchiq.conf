#  PatchIQ reverse proxy — LAN (192.168.1.17) + WAN (122.176.60.111)
#  Run via docker with --network=host so upstreams are reachable at 127.0.0.1.
#
#  Ports exposed by this nginx (inside router forward range 3000-3199):
#    :3180 → Patch Manager UI (web)       +  /api → server :8180
#    :3181 → Hub Manager UI (web-hub)     +  /api → hub    :8182
#    :3182 → Agent UI (web-agent)         +  /api → agent  :8190
#
#  gRPC for agents is NOT proxied here — agents connect directly to
#  122.176.60.111:50151 (server binds gRPC on 0.0.0.0:50151). This preserves
#  mTLS end-to-end (nginx TLS termination would break client-cert auth).

worker_processes auto;
events { worker_connections 1024; }

# ───────── Agent gRPC TCP passthrough on :3313 (rishab) ─────────
# Pure TCP passthrough (not L7 gRPC). Works for h2c today and is mTLS-ready
# for PIQ-116 — when TLS is enabled, the handshake survives end-to-end
# because nginx never opens the gRPC stream.
#
# Port is per-user: rishab (+300 offset) → 3313, upstream 50351.
# Keeps the agent gRPC proxy port inside each developer's own 33xx range
# so it doesn't collide with sandy's 3003 or heramb's reserved 3001-3003.
# Other developers follow the same pattern:
#   heramb (+0)    → 3013 → 50051
#   sandy  (+100)  → 3113 → 50151
#   danish (+200)  → 3213 → 50251
#   rishab (+300)  → 3313 → 50351  (this block)
stream {
    server {
        listen 3313;
        proxy_pass 127.0.0.1:50351;
        proxy_timeout 86400s;  # match the 24h timeout used for long-lived sync streams
    }
}

http {
    # Generous timeouts for SSE / long polls / Vite HMR websockets
    proxy_http_version 1.1;
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_buffering     off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ───────── Agent gRPC (h2c) on :3003 ─────────
    # Cleartext HTTP/2 → server gRPC :50151. Server uses plain gRPC
    # (cmd/server/main.go uses NewGRPCServer, not WithTLS), and the
    # agent dials with insecure credentials, so end-to-end h2c is correct.
    # 3003 is in the router-forwarded range and confirmed reachable from WAN.
    server {
        listen 3003 http2;
        server_name _;

        # gRPC streams sit idle (e.g. SyncOutbox when nothing to sync).
        # Match the 24h timeout used elsewhere for long-lived streams.
        grpc_read_timeout  86400s;
        grpc_send_timeout  86400s;

        location / {
            grpc_pass grpc://127.0.0.1:50151;
            grpc_set_header X-Real-IP $remote_addr;
        }
    }

    # ───────── Patch Manager (web) on :80 ─────────
    server {
        listen 3180 default_server;
        server_name _;

        # Vite dev HMR websocket + SPA
        location / {
            proxy_pass         http://127.0.0.1:3101;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
        }

        # Server REST API
        location /api/ {
            proxy_pass         http://127.0.0.1:8180;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID       "00000000-0000-0000-0000-000000000001";
            proxy_set_header   X-User-ID         "dev-user";
        }

        location /health {
            proxy_pass         http://127.0.0.1:8180;
            proxy_set_header   Host              $host;
        }
    }

    # ───────── Hub Manager (web-hub) on :81 ─────────
    server {
        listen 3181;
        server_name _;

        location / {
            proxy_pass         http://127.0.0.1:3102;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
        }

        location /api/ {
            proxy_pass         http://127.0.0.1:8182;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Tenant-ID       "00000000-0000-0000-0000-000000000001";
            proxy_set_header   X-User-ID         "dev-user";
        }

        location /health {
            proxy_pass         http://127.0.0.1:8182;
            proxy_set_header   Host              $host;
        }
    }

    # ───────── Agent UI (web-agent) on :82 ─────────
    server {
        listen 3182;
        server_name _;

        location / {
            proxy_pass         http://127.0.0.1:3103;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
        }

        location /api/ {
            proxy_pass         http://127.0.0.1:8190;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
