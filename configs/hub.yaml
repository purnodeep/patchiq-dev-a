hub:
  http:
    port: 8082
    read_timeout: 30s
    write_timeout: 30s
    idle_timeout: 120s
  shutdown_timeout: 15s
  minio:
    endpoint: "localhost:9000"
    access_key: "" # Set via PATCHIQ_HUB_HUB_MINIO_ACCESS_KEY env var
    secret_key: "" # Set via PATCHIQ_HUB_HUB_MINIO_SECRET_KEY env var
    bucket: "patchiq-binaries"
    use_ssl: false
  default_tenant_id: "00000000-0000-0000-0000-000000000001"
  cors_origins:
    - "http://localhost:3002"
    - "http://localhost:5173"
    - "http://localhost:5174"
    - "http://localhost:5175"

database:
  url: "" # Set via PATCHIQ_HUB_DATABASE_URL env var
  max_conns: 200
  min_conns: 50

watermill:
  postgres_url: "" # Set via PATCHIQ_HUB_WATERMILL_POSTGRES_URL env var

log:
  level: "info"
  format: "json"

env: "development"

otel:
  endpoint: ""
  insecure: true

iam:
  zitadel:
    domain: "localhost:8085"
    secure: false
    client_id: "363618248001921030"
    client_secret: ""
    service_account_key: ""
    redirect_uri: "http://localhost:8082/api/v1/auth/callback"
  session:
    cookie_name: "piq_hub_session"
    cookie_secure: false
    cookie_domain: "localhost"
    access_token_ttl: 24h
    refresh_token_ttl: 168h
    post_login_url: "http://localhost:3002/"
