name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Check disk space
        run: |
          USAGE=$(df / --output=pcent | tail -1 | tr -d ' %')
          echo "Disk usage: ${USAGE}%"
          if [ "$USAGE" -gt 85 ]; then
            echo "::error::Disk usage at ${USAGE}% — aborting to prevent filling disk"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm -r build

      - name: Verify frontend assets
        run: |
          for dir in web/dist web-hub/dist; do
            if [ ! -d "$dir" ]; then
              echo "::error::${dir} not found after frontend build"
              exit 1
            fi
            FILE_COUNT=$(find "$dir" -type f | wc -l)
            if [ "$FILE_COUNT" -lt 1 ]; then
              echo "::error::${dir} is empty — frontend build produced no output"
              exit 1
            fi
            echo "${dir}: ${FILE_COUNT} files"
          done

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-agent-windows:
    name: Build Windows Agent
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Check disk space
        run: |
          USAGE=$(df / --output=pcent | tail -1 | tr -d ' %')
          echo "Disk usage: ${USAGE}%"
          if [ "$USAGE" -gt 85 ]; then
            echo "::error::Disk usage at ${USAGE}% — aborting to prevent filling disk"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows agent with baked server address
        env:
          SERVER_ADDR: ${{ secrets.PATCHIQ_PUBLIC_SERVER_ADDR }}
        run: |
          if [ -z "$SERVER_ADDR" ]; then
            echo "ERROR: PATCHIQ_PUBLIC_SERVER_ADDR secret not set in repo settings"
            exit 1
          fi
          make build-agent-windows SERVER_ADDR="$SERVER_ADDR"

      - name: Upload Windows agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: patchiq-agent-windows-amd64
          path: bin/patchiq-agent.exe
