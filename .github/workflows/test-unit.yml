name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: self-hosted-ci
  cancel-in-progress: false

jobs:
  go-test:
    name: Go Tests
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Check disk space
        run: |
          USAGE=$(df / --output=pcent | tail -1 | tr -d ' %')
          echo "Disk usage: ${USAGE}%"
          if [ "$USAGE" -gt 85 ]; then
            echo "::error::Disk usage at ${USAGE}% — aborting to prevent filling disk"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        timeout-minutes: 12
        run: go test -race -count=1 ./...

  frontend-test:
    name: Frontend Tests
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Check disk space
        run: |
          USAGE=$(df / --output=pcent | tail -1 | tr -d ' %')
          echo "Disk usage: ${USAGE}%"
          if [ "$USAGE" -gt 85 ]; then
            echo "::error::Disk usage at ${USAGE}% — aborting to prevent filling disk"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        timeout-minutes: 8
        run: pnpm -r test
